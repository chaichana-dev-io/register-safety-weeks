<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN SAFETY - Safety Week 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #eaf4ff; font-family: 'Sarabun', sans-serif; padding-top: 20px; }
    .form-container { max-width: 500px; margin: auto; background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); position: relative; min-height: 600px; }
    .header { text-align: center; margin-bottom: 25px; }
    .header img { max-width: 200px; height: auto; }
    .header h3 { color: #1e88e5; font-weight: bold; }
    .confirm-label { font-weight: bold; color: #555; width: 120px; display: inline-block; }
    #successOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); z-index: 100; border-radius: 15px; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    .success-icon { font-size: 80px; color: #28a745; margin-bottom: 20px; }
    .btn-primary { background-color: #007bff; border: none; padding: 12px; border-radius: 25px; width: 100%; transition: all 0.3s ease; }
    .btn-primary:hover { background-color: #0056b3; transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div id="successOverlay">
        <div class="success-icon">✅</div>
        <h2 class="text-success fw-bold">ลงทะเบียนสำเร็จ!</h2>
        <p class="mb-0 text-muted">ID: <span id="displayResId" class="text-primary fw-bold fs-3"></span></p>
      </div>

      <div class="header">
        <img src="https://img1.pic.in.th/images/Untitled-design-2d8adeba2eeb40dfa.png" alt="Safety Week Logo">
        <h3>Safety Week 2026</h3>
        <p class="text-muted">ลงทะเบียนเข้าร่วมกิจกรรม</p>
      </div>

      <form id="regForm">
        <div class="mb-3">
          <label class="form-label">รหัสพนักงาน</label>
          <input type="number" class="form-control" name="empId" id="inp_empId" required placeholder="ตัวอย่าง 00XXXX">
        </div>
        <div class="mb-3">
          <label class="form-label">ชื่อ-นามสกุล</label>
          <input type="text" class="form-control" name="fullName" id="inp_name" required placeholder="ไม่ต้องใส่คำนำหน้า">
        </div>
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">แผนก</label>
            <input type="text" class="form-control" name="dept" id="inp_dept" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">ฝ่าย</label>
            <input type="text" class="form-control" name="section" id="inp_sect" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">อีเมล</label>
          <input type="email" class="form-control" name="email" id="inp_email" required placeholder="example@company.com">
        </div>
        <div class="mb-4">
          <label class="form-label">วันที่เข้าร่วม</label>
          <select class="form-select" name="date" id="date" required>
            <option value="">กำลังโหลดวันที่...</option>
          </select>
        </div>
        <button type="button" class="btn btn-primary shadow-sm" onclick="showConfirm()">ลงทะเบียน</button>
      </form>
    </div>
  </div>

  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header">
          <h5 class="modal-title text-primary">ตรวจสอบความถูกต้อง</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="confirmData"></div>
        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">แก้ไข</button>
          <button type="button" class="btn btn-success px-4" id="confirmBtn" onclick="submitForm()">ยืนยันความถูกต้อง</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // [จุดแก้ไข] ใส่ลิงก์ Web App ของนายที่นี่
    const API_URL = "https://script.google.com/macros/s/AKfycbwxZiFOb4ejykCFG6RV5YILD0y4m2pVmdk3KB5lkED31RE2XoD9iyKiLxrzkS-hL5nt/exec";
    
    const modalEl = document.getElementById('confirmModal');
    const modal = new bootstrap.Modal(modalEl);

    // ดึงข้อมูลวันที่จาก GAS ตอนโหลดหน้าเว็บ
    window.onload = () => { 
      fetch(`${API_URL}?action=getOptions`)
        .then(res => res.json())
        .then(res => {
          let el = document.getElementById('date'); 
          el.innerHTML = '<option value="">เลือกวันที่</option>';
          res.dates.forEach(d => el.innerHTML += `<option value="${d}">${d}</option>`);
        })
        .catch(err => console.error("โหลดข้อมูลไม่สำเร็จ", err));
    };

    function showConfirm() {
      const form = document.getElementById('regForm');
      if(!form.checkValidity()) { form.reportValidity(); return; }
      
      const formattedEmpId = document.getElementById('inp_empId').value.toString().padStart(6, '0');
      let html = `
        <div class="p-2">
          <div class="mb-2"><span class="confirm-label">รหัสพนักงาน:</span> <span class="text-primary fw-bold">${formattedEmpId}</span></div>
          <div class="mb-2"><span class="confirm-label">ชื่อ-นามสกุล:</span> <span>${document.getElementById('inp_name').value}</span></div>
          <div class="mb-2"><span class="confirm-label">แผนก/ฝ่าย:</span> <span>${document.getElementById('inp_dept').value} / ${document.getElementById('inp_sect').value}</span></div>
          <div class="mb-2"><span class="confirm-label">อีเมล:</span> <span>${document.getElementById('inp_email').value}</span></div>
          <div class="mb-2"><span class="confirm-label">วันที่เข้าร่วม:</span> <span class="badge bg-info text-dark">${document.getElementById('date').value}</span></div>
        </div>`;
      document.getElementById('confirmData').innerHTML = html;
      modal.show();
    }

    function submitForm() {
      const btn = document.getElementById('confirmBtn');
      const form = document.getElementById('regForm');
      const formData = new FormData(form);
      
      btn.disabled = true; 
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

      // ส่งข้อมูลไปยัง GAS แบบ POST
      fetch(API_URL, {
        method: 'POST',
        body: new URLSearchParams(formData)
      })
      .then(res => res.json())
      .then(res => {
        modal.hide();
        document.getElementById('displayResId').innerText = res.id;
        const overlay = document.getElementById('successOverlay');
        overlay.style.display = 'flex';
        form.reset();
        btn.disabled = false; 
        btn.innerHTML = 'ยืนยันความถูกต้อง';
        setTimeout(() => { overlay.style.display = 'none'; }, 3000);
      })
      .catch(err => {
        alert("เกิดข้อผิดพลาดในการบันทึก");
        btn.disabled = false;
        btn.innerHTML = 'ยืนยันความถูกต้อง';
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Week 2026 - Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  
  <style>
    body { background-color: #eaf4ff; font-family: 'Sarabun', sans-serif; padding-top: 20px; }
    .form-container { 
      max-width: 500px; 
      margin: auto; 
      background: #ffffff; 
      padding: 30px; 
      border-radius: 10px; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
      position: relative; 
      min-height: 600px;
    }
    .header { text-align: center; margin-bottom: 25px; }
    .header img { max-width: 200px; height: auto; }
    .header h3 { color: #1e88e5; font-weight: bold; margin-top: 10px; }
    
    #successOverlay {
      display: none; 
      position: absolute; 
      top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(255, 255, 255, 0.98); 
      z-index: 100; 
      border-radius: 10px; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      text-align: center; 
      padding: 20px;
    }
    .success-icon { font-size: 80px; color: #28a745; margin-bottom: 20px; }
    .confirm-label { font-weight: bold; color: #555; width: 120px; display: inline-block; }
    .btn-primary { background-color: #007bff; border: none; padding: 12px; border-radius: 25px; width: 100%; transition: 0.3s; }
    .btn-primary:hover { background-color: #0056b3; transform: scale(1.02); }
  </style>
</head>
<body>

  <div class="container">
    <div class="form-container">
      
      <div id="successOverlay">
        <div class="success-icon">✅</div>
        <h2 class="text-success fw-bold">ลงทะเบียนสำเร็จ!</h2>
        <p class="text-muted">กรุณาแคปหน้าจอหรือตรวจสอบอีเมล</p>
        <div class="p-3 bg-light rounded-3 w-100">
          <small class="text-muted d-block">รหัสอ้างอิงของคุณ:</small>
          <span id="displayResId" class="text-primary fw-bold fs-3"></span>
        </div>
        <button class="btn btn-outline-primary mt-4 rounded-pill" onclick="location.reload()">กลับหน้าหลัก</button>
      </div>

      <div class="header">
        <img src="https://img1.pic.in.th/images/Untitled-design-2d8adeba2eeb40dfa.png" alt="Safety Week Logo">
        <h3>Safety Week 2026</h3>
        <p class="text-muted">ลงทะเบียนเข้าร่วมกิจกรรม</p>
      </div>

      <form id="regForm" onkeydown="return event.key != 'Enter';">
        <div class="mb-3">
          <label class="form-label fw-bold">รหัสพนักงาน</label>
          <input type="number" class="form-control" name="empId" id="inp_empId" required placeholder="00XXXX">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
          <input type="text" class="form-control" name="fullName" id="inp_name" required placeholder="ชื่อ และ นามสกุล">
        </div>
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">แผนก</label>
            <input type="text" class="form-control" name="dept" id="inp_dept" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">ฝ่าย</label>
            <input type="text" class="form-control" name="section" id="inp_sect" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">อีเมล</label>
          <input type="email" class="form-control" name="email" id="inp_email" required placeholder="example@company.com">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">วันที่เข้าร่วม</label>
          <select class="form-select" name="date" id="date" required>
            <option value="">เลือกวันที่ต้องการเข้าร่วม</option>
            <option value="10 มิถุนายน 2569">10 มิถุนายน 2569</option>
            <option value="11 มิถุนายน 2569">11 มิถุนายน 2569</option>
            <option value="12 มิถุนายน 2569">12 มิถุนายน 2569</option>
          </select>
        </div>

        <button type="button" class="btn btn-primary shadow-sm" onclick="showConfirm()">ลงทะเบียน</button>
      </form>
    </div>
  </div>

  <div class="modal fade" id="confirmModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-light">
          <h5 class="modal-title text-primary fw-bold">ตรวจสอบข้อมูลของคุณ</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="confirmData">
          </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">แก้ไข</button>
          <button type="button" class="btn btn-success px-4" id="confirmBtn" onclick="submitForm()">ยืนยันข้อมูล</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // [จุดแก้ไขสำคัญ] ใส่ลิงก์ Web App (Google Apps Script) ที่ Deploy เป็น Anyone แล้ว
    const API_URL = "https://script.google.com/macros/s/AKfycbw7jTfnCLyEkkLMypY2LQjxAq5DUjgejyvE0IFaFWm95poUMEESU6ptU6i_mIjxNa9iag/exec";
    
    const modal = new bootstrap.Modal(document.getElementById('confirmModal'));

    function showConfirm() {
      const form = document.getElementById('regForm');
      if(!form.checkValidity()) { form.reportValidity(); return; }
      
      const empId = document.getElementById('inp_empId').value.padStart(6, '0');
      document.getElementById('confirmData').innerHTML = `
        <div class="p-2">
          <p><span class="confirm-label">รหัสพนักงาน:</span> <b class="text-primary">${empId}</b></p>
          <p><span class="confirm-label">ชื่อ-นามสกุล:</span> <b>${document.getElementById('inp_name').value}</b></p>
          <p><span class="confirm-label">แผนก/ฝ่าย:</span> <b>${document.getElementById('inp_dept').value} / ${document.getElementById('inp_sect').value}</b></p>
          <p><span class="confirm-label">อีเมล:</span> <b>${document.getElementById('inp_email').value}</b></p>
          <p><span class="confirm-label">วันที่เข้าร่วม:</span> <span class="badge bg-info text-dark">${document.getElementById('date').value}</span></p>
        </div>`;
      modal.show();
    }

    async function submitForm() {
      const btn = document.getElementById('confirmBtn');
      const form = document.getElementById('regForm');
      const formData = new FormData(form);
      
      btn.disabled = true; 
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

      try {
        // ส่งข้อมูลไปยัง Google Apps Script
        const response = await fetch(API_URL, {
          method: 'POST',
          body: new URLSearchParams(formData)
        });
        
        const res = await response.json();
        
        if (res.success || res.status === 'success') {
          modal.hide();
          document.getElementById('displayResId').innerText = res.id;
          document.getElementById('successOverlay').style.display = 'flex';
          form.reset();
        } else {
          throw new Error('บันทึกไม่สำเร็จ');
        }
      } catch (err) {
        alert("ขออภัย! เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง");
        btn.disabled = false;
        btn.innerHTML = 'ยืนยันข้อมูล';
      }
    }
  </script>
</body>
</html>
